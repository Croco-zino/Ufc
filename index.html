<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Stream</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#0b0b0b;
      font-family:Arial, sans-serif;
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
        radial-gradient(circle at top, #1a1a1a 0%, #0b0b0b 60%);
    }

    .player-container{
      width:95%;
      height:92vh;
      border-radius:22px;
      overflow:hidden;
      position:relative;
      box-shadow:
        0 0 25px rgba(0,0,0,.7),
        0 0 60px rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      background:#000;
      backdrop-filter:blur(10px);
    }

    .top-bar{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      z-index:5;
      padding:14px 18px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:linear-gradient(to bottom,
      rgba(0,0,0,.75),
      transparent);
      pointer-events:none;
    }

    .live{
      background:#ff1f4b;
      color:#fff;
      padding:6px 12px;
      border-radius:999px;
      font-size:13px;
      font-weight:bold;
      letter-spacing:1px;
      box-shadow:0 0 15px rgba(255,31,75,.6);
    }

    .quality{
      color:#fff;
      font-size:13px;
      opacity:.8;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
      background:#000;
    }

    .overlay{
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
      linear-gradient(to top,
      rgba(0,0,0,.35),
      transparent 30%,
      transparent 70%,
      rgba(0,0,0,.25));
    }

    @media(max-width:768px){
      .player-container{
        width:100%;
        height:100vh;
        border-radius:0;
      }
    }
  </style>
</head>

<body>

  <div class="player-container">

    <div class="top-bar">
      <div class="live">● LIVE</div>
      <div class="quality">HD Streaming</div>
    </div>

    <iframe
      id="main-player-frame"
      src="https://backlik.com/mma/blog"
      allow="autoplay; encrypted-media; fullscreen; picture-in-picture"
      allowfullscreen
      playsinline
      sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation allow-storage-access-by-user-activation">
    </iframe>

    <div class="overlay"></div>

  </div>

</body>
</html>
