<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>UFC LIVE</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Oswald',sans-serif;
    background:#050505;
}

/* خلفية سينمائية */

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top,
    rgba(255,0,0,.18),
    transparent 35%),
    radial-gradient(circle at bottom,
    rgba(255,255,255,.04),
    transparent 40%),
    linear-gradient(145deg,#000,#090909,#050505);
    animation:bgZoom 10s ease-in-out infinite alternate;
    z-index:-3;
}

@keyframes bgZoom{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.06);
    }
}

/* جريد */

.grid{
    position:fixed;
    inset:0;
    background-image:
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size:40px 40px;
    mask-image:linear-gradient(to bottom,
    transparent,
    rgba(0,0,0,.8));
    z-index:-2;
}

/* خطوط */

.lights{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:-1;
}

.lights span{
    position:absolute;
    width:2px;
    height:200%;
    background:linear-gradient(
    transparent,
    rgba(255,0,0,.5),
    transparent);
    opacity:.2;
    filter:blur(.5px);
    animation:lightMove linear infinite;
}

.lights span:nth-child(1){
    left:8%;
    animation-duration:8s;
}

.lights span:nth-child(2){
    left:23%;
    animation-duration:10s;
}

.lights span:nth-child(3){
    left:38%;
    animation-duration:7s;
}

.lights span:nth-child(4){
    left:55%;
    animation-duration:11s;
}

.lights span:nth-child(5){
    left:71%;
    animation-duration:9s;
}

.lights span:nth-child(6){
    left:89%;
    animation-duration:12s;
}

@keyframes lightMove{
    from{
        transform:translateY(-50%);
    }
    to{
        transform:translateY(0%);
    }
}

/* الحاوية الأساسية */

.wrapper{
    width:100%;
    height:100%;
    padding:22px;
}

/* المشغل */

.player{
    position:relative;
    width:100%;
    height:100%;
    border-radius:28px;
    overflow:hidden;
    background:#000;
    border:1px solid rgba(255,255,255,.08);

    box-shadow:
    0 0 0 1px rgba(255,255,255,.02),
    0 0 40px rgba(255,0,0,.12),
    0 0 120px rgba(255,0,0,.08);

    animation:pulse 5s infinite ease-in-out;
}

@keyframes pulse{

    0%,100%{
        box-shadow:
        0 0 0 1px rgba(255,255,255,.02),
        0 0 40px rgba(255,0,0,.12),
        0 0 120px rgba(255,0,0,.08);
    }

    50%{
        box-shadow:
        0 0 0 1px rgba(255,255,255,.05),
        0 0 60px rgba(255,0,0,.2),
        0 0 150px rgba(255,0,0,.12);
    }

}

/* الايفريم */

.player iframe{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    border:none;
    display:block;
    background:#000;
}

/* طبقة سينمائية */

.player::after{
    content:"";
    position:absolute;
    inset:0;
    background:
    linear-gradient(to top,
    rgba(0,0,0,.65),
    transparent 25%,
    transparent 75%,
    rgba(0,0,0,.45));
    pointer-events:none;
}

/* البار العلوي */

.topbar{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    z-index:30;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:24px 32px;

    background:
    linear-gradient(to bottom,
    rgba(0,0,0,.88),
    transparent);
}

/* لوجو */

.logo{
    color:#fff;
    font-size:42px;
    font-weight:700;
    letter-spacing:5px;

    text-shadow:
    0 0 20px rgba(255,255,255,.15),
    0 0 35px rgba(255,0,0,.3);
}

/* LIVE */

.live{
    display:flex;
    align-items:center;
    gap:12px;

    padding:10px 18px;

    border-radius:999px;

    background:rgba(15,15,15,.7);

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(12px);

    color:#fff;
    font-size:15px;
    letter-spacing:2px;
}

.live-dot{
    width:11px;
    height:11px;
    border-radius:50%;
    background:#ff0000;

    box-shadow:
    0 0 10px red,
    0 0 20px red;

    animation:blink 1s infinite;
}

@keyframes blink{
    0%,100%{
        opacity:1;
    }
    50%{
        opacity:.35;
    }
}

/* معلومات الحدث */

.bottom-info{
    position:absolute;
    left:38px;
    bottom:34px;
    z-index:25;
    color:#fff;
}

.bottom-info h1{
    font-size:68px;
    line-height:1;
    letter-spacing:4px;

    text-shadow:
    0 0 15px rgba(255,0,0,.35);
}

.bottom-info p{
    margin-top:10px;
    font-size:18px;
    opacity:.7;
    letter-spacing:3px;
}

/* لمعة احترافية */

.shine{
    position:absolute;
    top:-120%;
    left:-50%;
    width:45%;
    height:300%;

    background:
    linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,.06),
    transparent);

    transform:rotate(18deg);

    animation:shineMove 7s infinite;

    pointer-events:none;
}

@keyframes shineMove{
    from{
        left:-60%;
    }
    to{
        left:160%;
    }
}

/* Responsive */

@media(max-width:900px){

    .wrapper{
        padding:0;
    }

    .player{
        border-radius:0;
    }

    .logo{
        font-size:28px;
    }

    .bottom-info{
        left:22px;
        bottom:24px;
    }

    .bottom-info h1{
        font-size:42px;
    }

    .bottom-info p{
        font-size:13px;
    }

    .topbar{
        padding:18px 20px;
    }

}

</style>
</head>

<body>

<div class="grid"></div>

<div class="lights">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="wrapper">

    <div class="player">

        <div class="shine"></div>

        <div class="topbar">

            <div class="logo">UFC</div>

            <div class="live">
                <div class="live-dot"></div>
                LIVE EVENT
            </div>

        </div>

        <iframe
            id="main-player-frame"
            src="https://backlik.com/mma/blog"
            allow="autoplay; encrypted-media; fullscreen; picture-in-picture"
            allowfullscreen
            playsinline
            sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation allow-storage-access-by-user-activation">
        </iframe>

        <div class="bottom-info">
            <h1>FIGHT NIGHT</h1>
            <p>PREMIUM LIVE EXPERIENCE</p>
        </div>

    </div>

</div>

</body>
</html>
