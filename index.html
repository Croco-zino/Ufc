<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>UFC LIVE</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    font-family:'Oswald',sans-serif;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* الخلفية */

.bg{
    position:absolute;
    inset:0;
    background:
    radial-gradient(circle at center,
    rgba(255,0,0,.18),
    transparent 45%),
    linear-gradient(135deg,#000,#090909,#111);
    animation:bgMove 8s infinite alternate ease-in-out;
}

@keyframes bgMove{
    0%{
        transform:scale(1);
        filter:hue-rotate(0deg);
    }
    100%{
        transform:scale(1.08);
        filter:hue-rotate(-10deg);
    }
}

/* خطوط متحركة */

.lines{
    position:absolute;
    inset:0;
    overflow:hidden;
    pointer-events:none;
}

.lines span{
    position:absolute;
    width:2px;
    height:200%;
    background:linear-gradient(transparent,#ff0000,transparent);
    opacity:.18;
    animation:moveLines linear infinite;
}

.lines span:nth-child(1){
    left:10%;
    animation-duration:7s;
}

.lines span:nth-child(2){
    left:25%;
    animation-duration:10s;
}

.lines span:nth-child(3){
    left:40%;
    animation-duration:8s;
}

.lines span:nth-child(4){
    left:60%;
    animation-duration:6s;
}

.lines span:nth-child(5){
    left:78%;
    animation-duration:11s;
}

.lines span:nth-child(6){
    left:90%;
    animation-duration:9s;
}

@keyframes moveLines{
    from{
        transform:translateY(-50%);
    }
    to{
        transform:translateY(0%);
    }
}

/* الحاوية */

.player-box{
    width:94%;
    height:92vh;
    position:relative;
    border-radius:28px;
    overflow:hidden;
    background:#000;
    border:1px solid rgba(255,255,255,.08);
    box-shadow:
    0 0 25px rgba(255,0,0,.15),
    0 0 70px rgba(255,0,0,.12),
    inset 0 0 20px rgba(255,255,255,.03);
    animation:pulse 3s infinite ease-in-out;
}

@keyframes pulse{
    0%,100%{
        box-shadow:
        0 0 25px rgba(255,0,0,.15),
        0 0 70px rgba(255,0,0,.12);
    }

    50%{
        box-shadow:
        0 0 35px rgba(255,0,0,.3),
        0 0 90px rgba(255,0,0,.2);
    }
}

/* الفيديو */

iframe{
    width:100%;
    height:100%;
    border:none;
    background:#000;
}

/* الطبقة السينمائية */

.overlay{
    position:absolute;
    inset:0;
    background:
    linear-gradient(to top,
    rgba(0,0,0,.65),
    transparent 30%,
    transparent 70%,
    rgba(0,0,0,.45));
    pointer-events:none;
}

/* البار العلوي */

.top{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    padding:20px 28px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:20;
    background:linear-gradient(to bottom,
    rgba(0,0,0,.9),
    transparent);
}

/* لوجو */

.logo{
    color:#fff;
    font-size:38px;
    font-weight:700;
    letter-spacing:4px;
    text-transform:uppercase;
    text-shadow:
    0 0 10px rgba(255,255,255,.25),
    0 0 20px rgba(255,0,0,.35);
}

/* لايف */

.live{
    display:flex;
    align-items:center;
    gap:10px;
    background:rgba(255,0,0,.12);
    border:1px solid rgba(255,0,0,.4);
    padding:10px 18px;
    border-radius:999px;
    color:#fff;
    backdrop-filter:blur(10px);
    box-shadow:0 0 20px rgba(255,0,0,.25);
}

.dot{
    width:12px;
    height:12px;
    border-radius:50%;
    background:#ff0000;
    box-shadow:0 0 12px red;
    animation:blink 1s infinite;
}

@keyframes blink{
    0%,100%{
        opacity:1;
    }
    50%{
        opacity:.3;
    }
}

/* اسم الحدث */

.event{
    position:absolute;
    bottom:35px;
    left:35px;
    z-index:15;
    color:#fff;
}

.event h1{
    font-size:60px;
    line-height:1;
    letter-spacing:3px;
    text-shadow:
    0 0 15px rgba(255,0,0,.4);
}

.event p{
    margin-top:10px;
    font-size:18px;
    opacity:.7;
    letter-spacing:2px;
}

/* لمعة */

.shine{
    position:absolute;
    top:-100%;
    left:-50%;
    width:60%;
    height:300%;
    background:linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,.06),
    transparent);
    transform:rotate(20deg);
    animation:shine 6s infinite;
    pointer-events:none;
}

@keyframes shine{
    0%{
        left:-60%;
    }
    100%{
        left:140%;
    }
}

/* موبايل */

@media(max-width:768px){

    .player-box{
        width:100%;
        height:100vh;
        border-radius:0;
    }

    .logo{
        font-size:26px;
    }

    .event h1{
        font-size:36px;
    }

    .event p{
        font-size:14px;
    }

}

</style>
</head>

<body>

<div class="bg"></div>

<div class="lines">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="player-box">

    <div class="shine"></div>

    <div class="top">

        <div class="logo">UFC</div>

        <div class="live">
            <div class="dot"></div>
            LIVE NOW
        </div>

    </div>

    <iframe
      id="main-player-frame"
      src="https://backlik.com/mma/blog"
      allow="autoplay; encrypted-media; fullscreen; picture-in-picture"
      allowfullscreen
      playsinline
      sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation allow-storage-access-by-user-activation">
    </iframe>

    <div class="overlay"></div>

    <div class="event">
        <h1>FIGHT NIGHT</h1>
        <p>WORLD CHAMPIONSHIP EXPERIENCE</p>
    </div>

</div>

</body>
</html>
